# Web Scraper Service - Optimized GitHub Actions Workflow
#
# OPTIMIZED FOR PARALLEL PROCESSING:
# - Shared dependency caching reduces setup from ~60s to ~15s per job
# - Uses yarn/npm cache for faster installs
# - Only builds TypeScript once, shares via cache
# - Parallel matrix jobs for chunked URL processing
#
# This workflow is triggered by a repository_dispatch event from the main app.
# It scrapes the provided URLs and indexes them to Upstash Vector.
#
# Trigger payload format:
# {
#   "event_type": "scrape",
#   "client_payload": {
#     "total_chunks": "[1,2,3]",      // Matrix strategy array
#     "total_chunks_count": 3,         // Numeric count
#     "job_id": "abc123",
#     "brand_slug": "mysite",
#     "engine": "cheerio",             // cheerio | puppeteer | firecrawl
#     "callback_url": "https://...",
#     "chunk_1": "[\"url1\",\"url2\"]", // URLs for chunk 1
#     "chunk_2": "[\"url3\",\"url4\"]", // URLs for chunk 2
#     "chunk_3": "[\"url5\"]",          // URLs for chunk 3
#     // BYOK Vector DB credentials (optional)
#     "vector_db_provider": "upstash",
#     "vector_db_url": "https://...",
#     "vector_db_token": "...",
#     "vector_db_index": "...",
#     "vector_db_namespace": "..."
#   }
# }

name: Web Scraper

on:
  repository_dispatch:
    types: [scrape]

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      urls_json:
        description: "JSON array of URLs to scrape"
        required: true
        default: '["https://example.com"]'
      brand_slug:
        description: "Brand identifier for indexing"
        required: true
        default: "test"
      job_id:
        description: "Job ID for tracking"
        required: false
        default: ""
      engine:
        description: "Scraper engine (cheerio, puppeteer, or firecrawl)"
        required: false
        default: "cheerio"
        type: choice
        options:
          - cheerio
          - puppeteer
          - firecrawl
      total_chunks:
        description: "Total number of chunks for parallel processing"
        required: false
        default: "1"
      chunk_id:
        description: "Current chunk ID (1-based) for this job"
        required: false
        default: "1"

# Concurrency: Allow multiple scrape jobs to run in parallel but limit per-brand
concurrency:
  group: scrape-${{ github.event.client_payload.brand_slug || github.event.inputs.brand_slug || 'default' }}
  cancel-in-progress: false

jobs:
  # ============================================================
  # SETUP JOB - Runs once, shared by all parallel scrape jobs
  # ============================================================
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      cache-key: ${{ steps.cache-deps.outputs.cache-hit && steps.deps-cache-key.outputs.key || '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js with caching
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Generate deps cache key
        id: deps-cache-key
        run: |
          KEY="deps-${{ runner.os }}-${{ hashFiles('package-lock.json', 'package.json') }}"
          echo "key=$KEY" >> $GITHUB_OUTPUT

      - name: Cache node_modules
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            dist
          key: ${{ steps.deps-cache-key.outputs.key }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Install dependencies (if cache miss)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci --ignore-optional

      - name: Build TypeScript (if cache miss)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm run build

      - name: Determine chunk matrix
        id: set-matrix
        run: |
          # Get total chunks from payload or input (default to 1)
          TOTAL_CHUNKS="${{ github.event.client_payload.total_chunks_count || github.event.inputs.total_chunks || '1' }}"

          # Build JSON array [1] or [1,2,3,...] based on total chunks
          if [ "$TOTAL_CHUNKS" == "1" ]; then
            MATRIX='[1]'
          else
            MATRIX=$(seq 1 $TOTAL_CHUNKS | jq -cs '.')
          fi

          echo "📊 Parallel Processing Configuration:"
          echo "   Total chunks: $TOTAL_CHUNKS"
          echo "   Matrix: $MATRIX"
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

      - name: Log setup complete
        run: |
          echo "## Setup Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Cache hit:** ${{ steps.cache-deps.outputs.cache-hit }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Chunks to process:** ${{ github.event.client_payload.total_chunks_count || 1 }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Engine:** ${{ github.event.client_payload.engine || github.event.inputs.engine || 'cheerio' }}" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # SCRAPE JOBS - Run in parallel, one per chunk
  # ============================================================
  scrape:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        chunk: ${{ fromJSON(needs.setup.outputs.matrix) }}
    name: scrape-chunk-${{ matrix.chunk }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js with caching
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Restore cached dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            dist
          key: deps-${{ runner.os }}-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: |
            deps-${{ runner.os }}-

      - name: Install dependencies (if cache missed)
        run: |
          if [ ! -d "node_modules" ]; then
            echo "📦 Cache miss - installing dependencies..."
            npm ci --ignore-optional
            npm run build
          else
            echo "✅ Using cached node_modules"
          fi

      # Conditional Puppeteer setup - only when using puppeteer engine
      - name: Cache Puppeteer browsers
        if: github.event.client_payload.engine == 'puppeteer' || github.event.inputs.engine == 'puppeteer'
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            puppeteer-${{ runner.os }}-

      - name: Install Puppeteer
        if: github.event.client_payload.engine == 'puppeteer' || github.event.inputs.engine == 'puppeteer'
        run: |
          if [ ! -d "~/.cache/puppeteer" ] || [ -z "$(ls -A ~/.cache/puppeteer 2>/dev/null)" ]; then
            echo "📦 Installing Puppeteer..."
            npm install puppeteer
          else
            echo "✅ Using cached Puppeteer"
            npm install puppeteer --ignore-scripts
          fi

      - name: Determine URLs for this chunk
        id: get-urls
        env:
          CHUNK_ID: ${{ matrix.chunk }}
          # All chunk data from payload (chunked format)
          CHUNK_1: ${{ github.event.client_payload.chunk_1 || '' }}
          CHUNK_2: ${{ github.event.client_payload.chunk_2 || '' }}
          CHUNK_3: ${{ github.event.client_payload.chunk_3 || '' }}
          CHUNK_4: ${{ github.event.client_payload.chunk_4 || '' }}
          CHUNK_5: ${{ github.event.client_payload.chunk_5 || '' }}
          CHUNK_6: ${{ github.event.client_payload.chunk_6 || '' }}
          CHUNK_7: ${{ github.event.client_payload.chunk_7 || '' }}
          CHUNK_8: ${{ github.event.client_payload.chunk_8 || '' }}
          CHUNK_9: ${{ github.event.client_payload.chunk_9 || '' }}
          CHUNK_10: ${{ github.event.client_payload.chunk_10 || '' }}
          # Legacy format fallback (urls_json in payload)
          LEGACY_URLS: ${{ github.event.client_payload.urls_json || '' }}
          # Fallback for manual triggers
          MANUAL_URLS: ${{ github.event.inputs.urls_json || '' }}
        run: |
          # Select URLs based on chunk ID
          case "$CHUNK_ID" in
            1) URLS="$CHUNK_1" ;;
            2) URLS="$CHUNK_2" ;;
            3) URLS="$CHUNK_3" ;;
            4) URLS="$CHUNK_4" ;;
            5) URLS="$CHUNK_5" ;;
            6) URLS="$CHUNK_6" ;;
            7) URLS="$CHUNK_7" ;;
            8) URLS="$CHUNK_8" ;;
            9) URLS="$CHUNK_9" ;;
            10) URLS="$CHUNK_10" ;;
            *) URLS="" ;;
          esac

          # Fallback to legacy urls_json format from payload
          if [ -z "$URLS" ] && [ -n "$LEGACY_URLS" ]; then
            echo "📋 Using legacy urls_json format from payload"
            URLS="$LEGACY_URLS"
          fi

          # Fallback to manual input (for workflow_dispatch)
          if [ -z "$URLS" ] && [ -n "$MANUAL_URLS" ]; then
            echo "📋 Using manual urls_json input"
            URLS="$MANUAL_URLS"
          fi

          # Count URLs and display info
          URL_COUNT=$(echo "$URLS" | jq -r 'length' 2>/dev/null || echo '0')
          echo "📋 Chunk $CHUNK_ID: $URL_COUNT URLs to process"
          echo "urls_json=$URLS" >> $GITHUB_OUTPUT
          echo "url_count=$URL_COUNT" >> $GITHUB_OUTPUT

      - name: Run Scraper
        env:
          # Set memory limit based on engine (2GB for Cheerio, 4GB for Puppeteer)
          NODE_OPTIONS: ${{ (github.event.client_payload.engine == 'puppeteer' || github.event.inputs.engine == 'puppeteer') && '--max-old-space-size=4096 --expose-gc' || '--max-old-space-size=2048 --expose-gc' }}

          # Default Upstash credentials (from repository secrets)
          UPSTASH_VECTOR_REST_URL: ${{ secrets.UPSTASH_VECTOR_REST_URL }}
          UPSTASH_VECTOR_REST_TOKEN: ${{ secrets.UPSTASH_VECTOR_REST_TOKEN }}

          # Redis credentials for job status tracking
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}

          # BYOK Vector DB credentials (from dispatch payload)
          BYOK_VECTOR_DB_PROVIDER: ${{ github.event.client_payload.vector_db_provider }}
          BYOK_VECTOR_DB_URL: ${{ github.event.client_payload.vector_db_url }}
          BYOK_VECTOR_DB_TOKEN: ${{ github.event.client_payload.vector_db_token }}
          BYOK_VECTOR_DB_INDEX: ${{ github.event.client_payload.vector_db_index }}
          BYOK_VECTOR_DB_NAMESPACE: ${{ github.event.client_payload.vector_db_namespace }}

          # Callback configuration
          CALLBACK_SECRET: ${{ secrets.SCRAPER_CALLBACK_SECRET }}

          # Firecrawl API key (for firecrawl engine)
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}

          # Job parameters
          URLS_JSON: ${{ steps.get-urls.outputs.urls_json }}
          BRAND_SLUG: ${{ github.event.client_payload.brand_slug || github.event.inputs.brand_slug }}
          JOB_ID: ${{ github.event.client_payload.job_id || github.event.inputs.job_id }}
          CALLBACK_URL: ${{ github.event.client_payload.callback_url || '' }}
          SCRAPER_ENGINE: ${{ github.event.client_payload.engine || github.event.inputs.engine || 'cheerio' }}

          # Chunk processing metadata
          CHUNK_ID: ${{ matrix.chunk }}
          TOTAL_CHUNKS: ${{ github.event.client_payload.total_chunks_count || github.event.inputs.total_chunks || 1 }}
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "  🚀 Scrape Job - Chunk $CHUNK_ID of $TOTAL_CHUNKS"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "📋 Configuration:"
          echo "   Brand: $BRAND_SLUG"
          echo "   Job ID: $JOB_ID"
          echo "   Engine: $SCRAPER_ENGINE"
          echo "   URLs: ${{ steps.get-urls.outputs.url_count }}"
          echo "   Memory: $NODE_OPTIONS"
          echo ""

          # Log BYOK status
          if [ -n "$BYOK_VECTOR_DB_URL" ]; then
            echo "   🔐 BYOK Mode: Using custom $BYOK_VECTOR_DB_PROVIDER vector DB"
          else
            echo "   📦 Default Mode: Using platform Upstash Vector"
          fi
          echo ""

          # Run the scraper
          npm run scrape

      - name: Job Summary
        if: always()
        env:
          CHUNK_ID: ${{ matrix.chunk }}
          TOTAL_CHUNKS: ${{ github.event.client_payload.total_chunks_count || github.event.inputs.total_chunks || 1 }}
        run: |
          echo "## Scrape Job Complete (Chunk $CHUNK_ID/$TOTAL_CHUNKS)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Brand** | ${{ github.event.client_payload.brand_slug || github.event.inputs.brand_slug }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Job ID** | ${{ github.event.client_payload.job_id || github.event.inputs.job_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Chunk** | $CHUNK_ID of $TOTAL_CHUNKS |" >> $GITHUB_STEP_SUMMARY
          echo "| **Engine** | ${{ github.event.client_payload.engine || github.event.inputs.engine || 'cheerio' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **URLs Processed** | ${{ steps.get-urls.outputs.url_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
